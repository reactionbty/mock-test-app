<!DOCTYPE html>
<html>
<head>
  <title>Mock Test Platform</title>

  <!-- MOBILE VIEW FIX -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #1a1d24, #0f1115);
      color: white;
    }

    .app-container {
      max-width: 480px;
      margin: auto;
      min-height: 100vh;
    }

    .screen {
      padding: 16px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding-bottom: 80px;
    }

    button {
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      background: linear-gradient(135deg, #1f2937, #374151);
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:active {
      transform: scale(0.96);
      background: linear-gradient(135deg, #2b7cff, #5aa2ff);
    }

    .top {
      padding: 12px;
    }

    .progress {
      height: 6px;
      background: #2c2d31;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #4da6ff;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 14px;
    }

    .question {
      padding: 16px;
      font-size: 17px;
      line-height: 1.4;
    }

    .option {
      background: #1c1f26;
      margin: 8px 12px;
      padding: 14px;
      border-radius: 10px;
      font-size: 15px;
    }

    .correct { background: #2e7d32; }
    .wrong { background: #c62828; }

    .bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 480px;
      margin: auto;
      display: flex;
      gap: 8px;
      padding: 10px;
      background: #111;
    }

    .bottom button {
      flex: 1;
      font-size: 14px;
      padding: 12px;
    }

    /* LOADER */
    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 12, 16, 0.96);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .loader-box {
      text-align: center;
      padding: 25px;
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
    }

    .ring {
      width: 50px;
      height: 50px;
      margin: auto;
      border-radius: 50%;
      border: 4px solid #2c2d31;
      border-top: 4px solid #4da6ff;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<div class="app-container">

<!-- SUBJECT -->
<div id="subjectScreen" class="screen">
  <h2>📘 Select Subject</h2>
  <div id="subjectButtons" class="grid"></div>
</div>

<!-- CHAPTER -->
<div id="chapterScreen" class="screen" style="display:none;">
  <h2>📖 Select Chapter</h2>
  <div id="chapterButtons" class="grid"></div>
  <div class="bottom">
    <button onclick="goBackToSubjects()">Back</button>
  </div>
</div>

<!-- SECTION -->
<div id="sectionScreen" class="screen" style="display:none;">
  <h2>🧩 Select Section</h2>
  <div id="sectionButtons" class="grid"></div>
  <div class="bottom">
    <button onclick="goBackToChapters()">Back</button>
  </div>
</div>

<!-- TEST -->
<div id="testScreen" style="display:none;">
  <div class="top">
    <div class="progress"><div id="progressBar" class="progress-bar"></div></div>
    <div class="stats">
      <div id="count"></div>
      <div>❌ <span id="wrong">0</span></div>
      <div>✅ <span id="correct">0</span></div>
    </div>
  </div>

  <div id="question" class="question"></div>
  <div id="options"></div>

  <div class="bottom">
    <button onclick="exitTest()">Exit</button>
    <button onclick="prevQuestion()">Back</button>
    <button onclick="nextQuestion()">Next</button>
  </div>
</div>

</div>

<!-- LOADER -->
<div id="loader">
  <div class="loader-box">
    <div class="ring"></div>
    <h3>Loading</h3>
    <p>Please wait...</p>
  </div>
</div>

<script>

const subjects = {
  "General Science": {
    "Physics": "https://opensheet.elk.sh/1tEG2kuga3HyZRIjSjqJ4A0zqZ9yJPEk8ePly6ct_-TY/1"
  }
};

const QUESTIONS_PER_SECTION = 100;

let data=[], filteredData=[], index=0, correctCount=0, wrongCount=0, locked=false, answers={};

function showLoader(){ loader.style.display="flex"; }
function hideLoader(){ loader.style.display="none"; }

function loadSubjects(){
  let html="";
  for(let sub in subjects){
    html+=`<button onclick="loadChapters('${sub}')">${sub}</button>`;
  }
  subjectButtons.innerHTML=html;
}

function loadChapters(sub){
  let html="";
  for(let ch in subjects[sub]){
    html+=`<button onclick="loadData('${sub}','${ch}')">${ch}</button>`;
  }
  subjectScreen.style.display="none";
  chapterScreen.style.display="block";
  chapterButtons.innerHTML=html;
}

function loadData(sub,ch){
  showLoader();
  fetch(subjects[sub][ch])
  .then(res=>res.json())
  .then(json=>{
    data=json;
    setTimeout(()=>{
      hideLoader();
      chapterScreen.style.display="none";
      sectionScreen.style.display="block";
      createSections();
    },500);
  });
}

function createSections(){
  let total=Math.ceil(data.length/QUESTIONS_PER_SECTION);
  let html="";
  for(let i=1;i<=total;i++){
    html+=`<button onclick="startTest(${i})">Section ${i}</button>`;
  }
  sectionButtons.innerHTML=html;
}

function startTest(sec){
  let start=(sec-1)*QUESTIONS_PER_SECTION;
  filteredData=data.slice(start,start+QUESTIONS_PER_SECTION);
  index=0; correctCount=0; wrongCount=0; answers={};
  sectionScreen.style.display="none";
  testScreen.style.display="block";
  showQuestion();
}

function showQuestion(){
  let q=filteredData[index];
  question.innerText=(index+1)+". "+q.Question;

  let html="";
  ["A","B","C","D"].forEach(opt=>{
    html+=`<div class="option" onclick="select('${opt}')">${opt}. ${q[opt]}</div>`;
  });
  options.innerHTML=html;

  if(answers[index]){
    let correct=q.Answer;
    document.querySelectorAll(".option").forEach((o,i)=>{
      let l=["A","B","C","D"][i];
      if(l===correct) o.classList.add("correct");
      if(l===answers[index] && l!==correct) o.classList.add("wrong");
    });
    locked=true;
  } else locked=false;

  updateUI();
}

function select(opt){
  if(locked) return;
  let correct=filteredData[index].Answer;
  answers[index]=opt;

  document.querySelectorAll(".option").forEach((o,i)=>{
    let l=["A","B","C","D"][i];
    if(l===correct) o.classList.add("correct");
    if(l===opt && l!==correct) o.classList.add("wrong");
  });

  opt===correct?correctCount++:wrongCount++;
  locked=true;
  updateUI();
}

function nextQuestion(){ if(index<filteredData.length-1){index++;showQuestion();}}
function prevQuestion(){ if(index>0){index--;showQuestion();}}

function exitTest(){
  testScreen.style.display="none";
  sectionScreen.style.display="block";
}

function goBackToSubjects(){
  chapterScreen.style.display="none";
  subjectScreen.style.display="block";
}

function goBackToChapters(){
  sectionScreen.style.display="none";
  chapterScreen.style.display="block";
}

function updateUI(){
  count.innerText=(index+1)+"/"+filteredData.length;
  correct.innerText=correctCount;
  wrong.innerText=wrongCount;
  progressBar.style.width=((index+1)/filteredData.length*100)+"%";
}

loadSubjects();

</script>

</body>
</html>
