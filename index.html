<!DOCTYPE html>
<html>
<head>
  <title>Mock Test Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', Arial;
  background: radial-gradient(circle at top, #1a1d24, #0b0d12);
  color: white;
}

.app-container {
  max-width: 480px;
  margin: auto;
  min-height: 100vh;
}

/* PAGE LOADER */
#pageLoader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #0b0d12;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.logo-box h1 {
  font-size: 28px;
  color: #4da6ff;
  animation: fade 1.2s infinite alternate;
}

@keyframes fade {
  from { opacity: 0.3; }
  to { opacity: 1; }
}

/* HEADER */
.header {
  padding: 20px 16px 10px;
}

.header h2 {
  margin: 0;
  font-size: 24px;
}

.header p {
  margin: 5px 0 0;
  color: #aaa;
  font-size: 13px;
}

/* GRID */
.grid {
  padding: 10px 16px 100px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* CARD */
.card-btn {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px;
  border-radius: 18px;
  background: linear-gradient(145deg, #14171c, #0d0f13);
  box-shadow:
    0 6px 30px rgba(0,0,0,0.7),
    inset 0 0 0 1px rgba(255,255,255,0.05);
  transition: 0.25s;
}

.card-btn:active {
  transform: scale(0.96);
  background: linear-gradient(145deg, #2b7cff, #5aa2ff);
}

.card-title { font-size: 17px; }
.card-sub { font-size: 12px; color: #888; margin-top: 4px; }

.badge {
  font-size: 12px;
  padding: 6px 10px;
  border-radius: 10px;
  background: rgba(77,166,255,0.2);
  color: #4da6ff;
}

/* TEST UI */
.top {
  padding: 12px;
}

.progress {
  height: 6px;
  background: #2c2d31;
  border-radius: 10px;
}

.progress-bar {
  height: 100%;
  background: #4da6ff;
  width: 0%;
}

.stats {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
  font-size: 14px;
}

.question {
  padding: 16px;
  font-size: 17px;
}

.option {
  background: #1c1f26;
  margin: 8px 12px;
  padding: 14px;
  border-radius: 10px;
}

.correct { background: #2e7d32; }
.wrong { background: #c62828; }

/* BOTTOM BAR */
.bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-width: 480px;
  margin: auto;
  display: flex;
  gap: 10px;
  padding: 12px;
  background: rgba(10,10,12,0.9);
}

.bottom button {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  color: white;
  background: linear-gradient(135deg, #1f2937, #374151);
}

/* LOADER */
#loader {
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background: rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.ring {
  width:50px;height:50px;
  border-radius:50%;
  border:4px solid #333;
  border-top:4px solid #4da6ff;
  animation: spin 1s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

  </style>
</head>

<body>

<!-- PAGE LOADER -->
<div id="pageLoader">
  <div class="logo-box">
    <h1>⚡ MockTest</h1>
  </div>
</div>

<div class="app-container">

<!-- SUBJECT -->
<div id="subjectScreen">
  <div class="header">
    <h2>👋 Welcome</h2>
    <p>Select a subject to begin</p>
  </div>
  <div id="subjectButtons" class="grid"></div>
</div>

<!-- CHAPTER -->
<div id="chapterScreen" style="display:none;">
  <div class="header">
    <h2>📖 Chapters</h2>
    <p>Choose a chapter</p>
  </div>
  <div id="chapterButtons" class="grid"></div>
  <div class="bottom">
    <button onclick="goBackToSubjects()">Back</button>
  </div>
</div>

<!-- SECTION -->
<div id="sectionScreen" style="display:none;">
  <div class="header">
    <h2>🧠 Sections</h2>
    <p>Select a section</p>
  </div>
  <div id="sectionButtons" class="grid"></div>
  <div class="bottom">
    <button onclick="goBackToChapters()">Back</button>
  </div>
</div>

<!-- TEST -->
<div id="testScreen" style="display:none;">
  <div class="top">
    <div class="progress"><div id="progressBar" class="progress-bar"></div></div>
    <div class="stats">
      <div id="count"></div>
      <div>❌ <span id="wrong">0</span></div>
      <div>✅ <span id="correct">0</span></div>
    </div>
  </div>

  <div id="question" class="question"></div>
  <div id="options"></div>

  <div class="bottom">
    <button onclick="exitTest()">Exit</button>
    <button onclick="prevQuestion()">Back</button>
    <button onclick="nextQuestion()">Next</button>
  </div>
</div>

</div>

<!-- LOADER -->
<div id="loader"><div class="ring"></div></div>

<script>

window.onload = function(){
  setTimeout(()=>{
    document.getElementById("pageLoader").style.display="none";
  },1000);
};

const subjects = {
  "General Science": {
    "Physics": "https://opensheet.elk.sh/1tEG2kuga3HyZRIjSjqJ4A0zqZ9yJPEk8ePly6ct_-TY/1"
  }
};

const QUESTIONS_PER_SECTION = 100;

let data=[], filteredData=[], index=0, correctCount=0, wrongCount=0, locked=false, answers={};

function showLoader(){ loader.style.display="flex"; }
function hideLoader(){ loader.style.display="none"; }

function loadSubjects(){
  let html="";
  for(let sub in subjects){
    html+=`
    <div class="card-btn" onclick="loadChapters('${sub}')">
      <div>
        <div class="card-title">📘 ${sub}</div>
        <div class="card-sub">Practice MCQs</div>
      </div>
      <div class="badge">New</div>
    </div>`;
  }
  subjectButtons.innerHTML=html;
}

function loadChapters(sub){
  let html="";
  for(let ch in subjects[sub]){
    html+=`
    <div class="card-btn" onclick="loadData('${sub}','${ch}')">
      <div>
        <div class="card-title">📖 ${ch}</div>
        <div class="card-sub">Start Practice</div>
      </div>
      <div class="badge">Start</div>
    </div>`;
  }
  subjectScreen.style.display="none";
  chapterScreen.style.display="block";
  chapterButtons.innerHTML=html;
}

function loadData(sub,ch){
  showLoader();
  fetch(subjects[sub][ch])
  .then(res=>res.json())
  .then(json=>{
    data=json;
    hideLoader();
    chapterScreen.style.display="none";
    sectionScreen.style.display="block";
    createSections();
  });
}

function createSections(){
  let total=Math.ceil(data.length/QUESTIONS_PER_SECTION);
  let html="";
  for(let i=1;i<=total;i++){
    html+=`
    <div class="card-btn" onclick="startTest(${i})">
      <div>
        <div class="card-title">Section ${i}</div>
        <div class="card-sub">Practice Set</div>
      </div>
      <div class="badge">Start Test</div>
    </div>`;
  }
  sectionButtons.innerHTML=html;
}

function startTest(sec){
  let start=(sec-1)*QUESTIONS_PER_SECTION;
  filteredData=data.slice(start,start+QUESTIONS_PER_SECTION);
  index=0; correctCount=0; wrongCount=0; answers={};
  sectionScreen.style.display="none";
  testScreen.style.display="block";
  showQuestion();
}

function showQuestion(){
  let q=filteredData[index];
  question.innerText=(index+1)+". "+q.Question;

  let html="";
  ["A","B","C","D"].forEach(opt=>{
    html+=`<div class="option" onclick="select('${opt}')">${opt}. ${q[opt]}</div>`;
  });
  options.innerHTML=html;

  let correct=q.Answer;

  if(answers[index]){
    document.querySelectorAll(".option").forEach((o,i)=>{
      let l=["A","B","C","D"][i];
      if(l===correct) o.classList.add("correct");
      if(l===answers[index] && l!==correct) o.classList.add("wrong");
    });
    locked=true;
  } else {
    locked=false;
  }

  updateUI();
}

function select(opt){
  let correct=filteredData[index].Answer;

  if(answers[index]) return;

  answers[index]=opt;

  document.querySelectorAll(".option").forEach((o,i)=>{
    let l=["A","B","C","D"][i];
    if(l===correct) o.classList.add("correct");
    if(l===opt && l!==correct) o.classList.add("wrong");
  });

  if(opt===correct) correctCount++;
  else wrongCount++;

  locked=true;
  updateUI();
}

function nextQuestion(){ if(index<filteredData.length-1){index++;showQuestion();}}
function prevQuestion(){ if(index>0){index--;showQuestion();}}

function exitTest(){
  testScreen.style.display="none";
  sectionScreen.style.display="block";
}

function goBackToSubjects(){
  chapterScreen.style.display="none";
  subjectScreen.style.display="block";
}

function goBackToChapters(){
  sectionScreen.style.display="none";
  chapterScreen.style.display="block";
}

function updateUI(){
  count.innerText=(index+1)+"/"+filteredData.length;
  correct.innerText=correctCount;
  wrong.innerText=wrongCount;
  progressBar.style.width=((index+1)/filteredData.length*100)+"%";
}

loadSubjects();

</script>

</body>
</html>
